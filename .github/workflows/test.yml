name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test
        # GSD_TOWN_INTEGRATION is intentionally NOT set — integration tests
        # require a live gastown daemon and are skipped in CI by default.
